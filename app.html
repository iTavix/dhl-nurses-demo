<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: lets the app paint edge-to-edge on notched iPhones; the CSS
       safe-area rules in src/styles.css keep the header/footer clear of notch & home bar. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DHL Nurses · Gestionale Trasferimento Infermieri</title>
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DHL Nurses" />
  <!-- Inline SVG favicon (self-contained, no external file) + file fallbacks for real deployments -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Cpath d='M5 17h5l2-5 3 9 2-4h6' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="alternate icon" href="/favicon.svg" type="image/svg+xml" />
  <!-- Safari pinned-tab (monochrome mask) -->
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#4f46e5" />
  <!-- iOS home-screen / bookmark icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  <!-- Boot splash: styled inline (no Tailwind dependency) so it paints immediately. -->
  <style>
    html { background-color: #f1f5f9; }
    html.dark { background-color: #0b1220; }
    #boot-splash {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: linear-gradient(135deg, #0f172a, #1e293b 50%, #312e81);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }
    #boot-splash .bs-logo {
      display: flex; align-items: center; justify-content: center; width: 56px; height: 56px;
      border-radius: 16px; background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 20px 40px rgba(30, 27, 75, .5);
    }
    #boot-splash .bs-title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
    #boot-splash .bs-spin {
      width: 22px; height: 22px; border-radius: 50%; margin-top: 4px;
      border: 2.5px solid rgba(148, 163, 184, .35); border-top-color: #818cf8;
      animation: bs-rotate .8s linear infinite;
    }
    @keyframes bs-rotate { to { transform: rotate(360deg); } }
  </style>
  <!-- Apply the saved theme before first paint so light/dark never flashes. -->
  <script>
    try {
      var _tm = localStorage.getItem('dhl.theme');
      if (_tm === 'dark' || (!_tm && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    } catch (e) { /* ignore */ }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-100 text-slate-800 antialiased">
  <div id="app">
    <!-- Static boot splash: shown instantly on launch, replaced by the app at the first real render. -->
    <div id="boot-splash">
      <div class="bs-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
        </svg>
      </div>
      <div class="bs-title">DHL Nurses</div>
      <div class="bs-spin"></div>
    </div>
  </div>

  <!-- App bundle: Vite entry (module scripts are deferred, so the splash above paints first). -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
